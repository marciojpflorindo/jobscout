<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>JobScout — applications</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="busybar" aria-hidden="true"></div>
  <div id="loading" class="loading">Loading…</div>

  <div id="app" class="wrap" hidden>
    <header class="app">
      <div>
        <h1>📊 JobScout</h1>
        <p id="subtitle" class="muted">—</p>
      </div>
      <div class="header-actions">
        <button id="btn-theme" class="ghost" title="Theme: auto / light / dark" aria-label="Change theme">🌓 Auto</button>
        <button id="btn-refresh" class="ghost" title="Reload">↻</button>
        <button id="btn-import" class="ghost" title="Import from a CSV file (replaces all applications)">⤓ Import CSV</button>
        <button id="btn-download" class="ghost" title="Download all applications as CSV">⤴ Download</button>
        <input type="file" id="file-import" accept=".csv,text/csv" hidden>
        <button id="btn-add" class="primary">+ New application</button>
      </div>
    </header>

    <div class="view-tabs" role="group" aria-label="Views">
      <button id="tab-tracker" class="view-tab" type="button" aria-pressed="false"
              title="Stats and charts for jobs you've applied to">
        <span class="tab-icon" aria-hidden="true">📊</span><span class="tab-label">Tracker</span>
      </button>
      <button id="tab-companies" class="view-tab" type="button" aria-pressed="false"
              title="Jobs you've applied to — your company list and pipeline">
        <span class="tab-icon" aria-hidden="true">🏢</span><span class="tab-label">Applications</span>
      </button>
      <button id="tab-review" class="view-tab" type="button" aria-pressed="false"
              title="Potential jobs the brain found — keep the good ones, reject the rest">
        <span class="tab-icon" aria-hidden="true">⭐</span><span class="tab-label">Review</span>
        <span class="tab-count" id="tab-review-count" hidden>0</span>
      </button>
    </div>

    <!-- Tracker-only chrome (KPIs, charts): hidden outside Tracker and
         when there are no applications yet, so a fresh scrape never shows empty charts. -->
    <div id="tracker-only">
    <section class="kpis" id="kpis"></section>

    <section class="charts">
      <div class="card span-2">
        <h2>Applications over time</h2>
        <div class="chart-box"><canvas id="chart-time"></canvas></div>
      </div>
      <div class="card">
        <h2>Funnel</h2>
        <div class="chart-box"><canvas id="chart-funnel"></canvas></div>
      </div>
      <div class="card">
        <h2>Application status</h2>
        <div class="chart-box"><canvas id="chart-status"></canvas></div>
      </div>
      <div class="card">
        <h2>Company response</h2>
        <div class="chart-box"><canvas id="chart-response"></canvas></div>
      </div>
      <div class="card">
        <h2>How I found the job</h2>
        <div class="chart-box"><canvas id="chart-source"></canvas></div>
      </div>
    </section>
    </div><!-- /#tracker-only -->

    <!-- Applications-only suggestions: still "Applied", no response, applied long ago -->
    <section id="stale" class="stale-bar" aria-label="Applications to close out">
      <div class="stale-head">
        <span class="stale-title">
          ⏳ <b id="stale-count">0</b> with no response for more than
          <select id="stale-days" aria-label="No-response day threshold">
            <option value="14">14 days</option>
            <option value="30" selected>30 days</option>
            <option value="60">60 days</option>
            <option value="90">90 days</option>
          </select>
        </span>
        <span class="spacer"></span>
        <button id="stale-close-all" class="ghost mini" hidden>Mark all as no response</button>
      </div>
      <ul id="stale-list" class="stale-list"></ul>
      <p id="stale-empty" class="muted stale-empty" hidden>All up to date — nothing to close out 🎉</p>
    </section>

    <section class="list-controls">
      <input type="search" id="search" placeholder="Search company or role…" aria-label="Search">
      <select id="filter-status" aria-label="Filter by status"><option value="">All statuses</option></select>
      <select id="sort" aria-label="Sort">
        <option value="activity-desc">Last activity</option>
        <option value="date-desc">Newest</option>
        <option value="date-asc">Oldest</option>
        <option value="company-asc">Company A–Z</option>
        <option value="status-asc">Status</option>
      </select>
      <span class="spacer"></span>
      <span id="count" class="muted"></span>
    </section>

    <div id="bulk-bar" class="bulk-bar" hidden>
      <span id="bulk-count" class="muted"></span>
      <span class="spacer"></span>
      <button id="bulk-clear" class="ghost">Clear selection</button>
      <button id="bulk-delete" class="danger">Delete selected</button>
    </div>

    <section id="list"></section>
    <div id="empty" class="empty" hidden>No applications match.</div>
  </div>

  <!-- Add / edit modal -->
  <div class="modal-bg" id="modal-bg" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h2 id="modal-title">New application</h2>
      <form id="form">
        <input type="hidden" name="id" value="">
        <div class="form-grid">
          <div class="field full">
            <label for="f-company">Company <span class="req">*</span></label>
            <input id="f-company" name="Company" required maxlength="200">
          </div>
          <div class="field">
            <label for="f-role">Role</label>
            <input id="f-role" name="Role" maxlength="200">
          </div>
          <div class="field">
            <label for="f-status">Status</label>
            <select id="f-status" name="Status"></select>
          </div>
          <div class="field">
            <label for="f-date">Application date</label>
            <input id="f-date" name="Date" type="date">
          </div>
          <div class="field">
            <label for="f-response">Response date</label>
            <input id="f-response" name="Response date" type="date">
          </div>
          <div class="field">
            <label for="f-contact">Contact via</label>
            <input id="f-contact" name="Contact via" maxlength="200">
          </div>
          <div class="field">
            <label for="f-month">Month</label>
            <select id="f-month" name="Month"><option value="">(automatic)</option></select>
          </div>
          <div class="field full">
            <label for="f-link">Job link</label>
            <input id="f-link" name="Job link" type="url" placeholder="https://…" maxlength="500">
          </div>
          <div class="field full">
            <label for="f-notes">Notes</label>
            <textarea id="f-notes" name="Notes" rows="5" maxlength="20000"></textarea>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="ghost" id="btn-cancel">Cancel</button>
          <button type="submit" class="primary" id="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/vendor/chart.umd.min.js"></script>
  <script src="/vendor/chartjs-plugin-datalabels.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
